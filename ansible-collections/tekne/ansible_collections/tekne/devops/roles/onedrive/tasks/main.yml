---
# tasks file for ./ansible-role-onedrive

# =============================================================================
# Package Installation
# =============================================================================

- name: Install OneDrive package
  community.general.pacman:
    name: "{{ onedrive_package }}"
    state: present
    extra_args: '--noconfirm --needed'
  tags:
    - onedrive
    - packages

# =============================================================================
# System Directories
# =============================================================================

- name: Create OneDrive log directory
  ansible.builtin.file:
    path: /home/dvaliente/.config/onedrive/logs
    state: directory
    owner: dvaliente
    group: users
    mode: '0775'
  tags:
    - onedrive
    - directories

# =============================================================================
# User Configuration
# =============================================================================

- name: Get user info for home directories
  ansible.builtin.getent:
    database: passwd
    key: "{{ item.name }}"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  register: user_info
  tags:
    - onedrive
    - config

- name: Create OneDrive config directory for each user
  ansible.builtin.file:
    path: "{{ item.ansible_facts.getent_passwd[item.item.name][4] }}/{{ onedrive_config_dir }}"
    state: directory
    owner: "{{ item.item.name }}"
    group: "{{ item.item.group | default(default_group) }}"
    mode: '0700'
  loop: "{{ user_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  tags:
    - onedrive
    - config

- name: Create OneDrive sync directory for each user
  ansible.builtin.file:
    path: "{{ item.ansible_facts.getent_passwd[item.item.name][4] }}/{{ onedrive_sync_dir }}"
    state: directory
    owner: "{{ item.item.name }}"
    group: "{{ item.item.group | default(default_group) }}"
    mode: '0700'
  loop: "{{ user_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  tags:
    - onedrive
    - config

- name: Copy OneDrive config file for each user
  ansible.builtin.copy:
    src: onedrive
    dest: "{{ item.ansible_facts.getent_passwd[item.item.name][4] }}/{{ onedrive_config_dir }}/config"
    owner: "{{ item.item.name }}"
    group: "{{ item.item.group | default(default_group) }}"
    mode: '0600'
  loop: "{{ user_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  tags:
    - onedrive
    - config

# =============================================================================
# Verification
# =============================================================================

- name: Verify OneDrive package is installed
  ansible.builtin.command:
    cmd: "pacman -Q {{ onedrive_package }}"
  register: package_verify
  changed_when: false
  failed_when: package_verify.rc != 0
  tags:
    - onedrive
    - verify

- name: Verify config directories exist for each user
  ansible.builtin.stat:
    path: "{{ item.ansible_facts.getent_passwd[item.item.name][4] }}/{{ onedrive_config_dir }}/config"
  loop: "{{ user_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: config_verify
  tags:
    - onedrive
    - verify

- name: Display installation summary
  ansible.builtin.debug:
    msg: |
      OneDrive Installation Summary:
      ==============================
      Package installed: {{ onedrive_package }}
      Users configured:
      {% for result in config_verify.results %}
      - {{ result.item.item.name }}: config={{ result.stat.exists }}
      {% endfor %}
  tags:
    - onedrive
    - verify
