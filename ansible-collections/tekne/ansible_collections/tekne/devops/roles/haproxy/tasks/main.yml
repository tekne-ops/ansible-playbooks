---
# tasks file for ansible-role-haproxy

- name: Create HAProxy directory
  ansible.builtin.file:
    path: /srv/docker/haproxy
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags:
    - haproxy
    - config

- name: Copy haproxy.cfg to /var/www/haproxy
  ansible.builtin.copy:
    src: haproxy.cfg
    dest: /srv/docker/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: '0644'
  tags:
    - haproxy
    - config

- name: Validate SSL PEM source (vault or path)
  ansible.builtin.assert:
    that:
      - (haproxy_ssl_pem is defined and (haproxy_ssl_pem | default('') | trim | length > 0)) or (haproxy_ssl_pem_path is defined and (haproxy_ssl_pem_path | default('') | trim | length > 0))
    fail_msg: "Set haproxy_ssl_pem (in vault) or haproxy_ssl_pem_path (-e) to provide the TLS cert+key for HAProxy. Do not commit the PEM file to the role."
    success_msg: "SSL PEM source configured"
  tags:
    - haproxy
    - config

- name: Deploy tekne.sv.pem to /var/www/haproxy
  ansible.builtin.copy:
    content: "{{ (haproxy_ssl_pem | default('')) if ((haproxy_ssl_pem | default('') | trim | length) > 0) else (lookup('file', haproxy_ssl_pem_path)) }}"
    dest: /srv/docker/haproxy/tekne.sv.pem
    owner: root
    group: root
    mode: '0600'
  tags:
    - haproxy
    - config

- name: Check if haproxy container already exists
  ansible.builtin.command: docker ps -a -f name=^haproxy$ --format '{{ "{{" }}.Names{{ "}}" }}'
  register: haproxy_container_check
  changed_when: false
  failed_when: false
  tags:
    - haproxy
    - docker

- name: Create and start haproxy Docker container
  ansible.builtin.shell: |
    docker run -d --name haproxy --restart=unless-stopped \
      --net host \
      -p 0.0.0.0:80:80 -p 0.0.0.0:443:443 \
      -v /srv/docker/haproxy/haproxy.cfg:/etc/haproxy/haproxy.cfg:ro \
      -v /srv/docker/haproxy/tekne.sv.pem:/etc/ssl/private/tekne.sv.pem:ro \
      haproxytech/haproxy-alpine:3.3
  when: (haproxy_container_check.stdout | trim) != 'haproxy'
  tags:
    - haproxy
    - docker
