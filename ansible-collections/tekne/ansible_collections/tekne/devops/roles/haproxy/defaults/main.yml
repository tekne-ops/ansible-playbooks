# defaults file for ansible-role-haproxy
#
# SSL certificate for HAProxy (tekne.sv). Provide exactly one of:
#   - haproxy_ssl_pem: full PEM content (cert + key) — set in vault
#   - haproxy_ssl_pem_path: path on the controller to the PEM file
# See vars/main.yml and README for secure setup.
haproxy_ssl_pem: null
haproxy_ssl_pem_path: null
