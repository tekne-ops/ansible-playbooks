---
# tasks file for consul

- name: Create consul directory
  ansible.builtin.file:
    path: "{{ consul_directory }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags:
    - consul
    - config

- name: Check if consul container already exists
  ansible.builtin.command: docker ps -a -f name=^consul$ --format '{{ "{{" }}.Names{{ "}}" }}'
  register: consul_container_check
  changed_when: false
  failed_when: false
  tags:
    - consul
    - docker

- name: Create and start consul Docker container
  ansible.builtin.shell: |
    docker run -d --name consul --restart=unless-stopped \
      --net {{ consul_docker_network }} --ip {{ consul_docker_ip }} \
      -v /srv/docker/consul/data:/consul/data \
      -v /srv/docker/consul/config:/consul/config \
      {{ consul_docker_image }}
  when: (consul_container_check.stdout | trim) != 'consul'
  register: consul_container_created
  tags:
    - consul
    - docker

- name: Wait for consul container to be available
  ansible.builtin.command: docker exec consul true
  register: consul_wait
  until: consul_wait.rc == 0
  retries: 12
  delay: 5
  changed_when: false
  when: (consul_container_check.stdout | trim) == 'consul' or consul_container_created is changed
  tags:
    - consul
    - docker
    - config

- name: Copy base.hcl to consul config directory
  ansible.builtin.copy:
    src: base.hcl
    dest: "{{ consul_directory }}/base.hcl"
    owner: root
    group: root
    mode: '0644'
  register: copy_base_hcl
  tags:
    - consul
    - config

# ---------------------------------------------------------------------------
# TLS: create certs directory, CA, rename, server cert, copy tls.hcl, restart
# ---------------------------------------------------------------------------

- name: Create consul config certs directory
  ansible.builtin.file:
    path: "{{ consul_directory }}/certs"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags:
    - consul
    - config
    - tls

- name: Check if consul TLS CA already exists
  ansible.builtin.stat:
    path: "{{ consul_directory }}/certs/{{ consul_tls_domain }}-agent-ca.pem"
  register: consul_tls_ca_file
  tags:
    - consul
    - tls

- name: Run consul tls ca create in certs directory
  ansible.builtin.shell: |
    docker exec consul sh -c 'mkdir -p /consul/config/certs && cd /consul/config/certs && consul tls ca create'
  when: not consul_tls_ca_file.stat.exists
  tags:
    - consul
    - tls

- name: Rename CA files to domain-named files
  ansible.builtin.shell: |
    docker exec consul sh -c 'cd /consul/config/certs && mv consul-agent-ca.pem {{ consul_tls_domain }}-agent-ca.pem && mv consul-agent-ca-key.pem {{ consul_tls_domain }}-agent-ca-key.pem'
  when: not consul_tls_ca_file.stat.exists
  tags:
    - consul
    - tls

- name: Run consul tls cert create (server) in certs directory
  ansible.builtin.shell: |
    docker exec consul sh -c 'cd /consul/config/certs && consul tls cert create -server -dc {{ consul_tls_dc }} -domain {{ consul_tls_domain }}'
  when: not consul_tls_ca_file.stat.exists
  register: consul_tls_cert_created
  tags:
    - consul
    - tls

- name: Set cert ownership for Consul process in container
  ansible.builtin.shell: |
    docker exec consul sh -c 'chown -R {{ consul_container_user }}:{{ consul_container_group }} /consul/config/certs'
  when: consul_tls_ca_file.stat.exists or (consul_tls_cert_created is defined and consul_tls_cert_created is changed)
  tags:
    - consul
    - tls

- name: Copy tls.hcl to consul config directory
  ansible.builtin.copy:
    src: tls.hcl
    dest: "{{ consul_directory }}/tls.hcl"
    owner: root
    group: root
    mode: '0644'
  register: copy_tls_hcl
  tags:
    - consul
    - config
    - tls

- name: Restart consul container
  ansible.builtin.command: docker restart consul
  when: >
    (copy_base_hcl is changed or copy_tls_hcl is changed or (consul_tls_cert_created is defined and consul_tls_cert_created is changed))
    and ((consul_container_check.stdout | trim) == 'consul' or consul_container_created is changed)
  tags:
    - consul
    - config

# ---------------------------------------------------------------------------
# ACL bootstrap: run once, save token to config directory
# ---------------------------------------------------------------------------
# Output is written inside the container to /consul/config/bootstrap_token.txt
# (mounted from host) so we don't rely on Ansible capturing docker exec stdout.

- name: Wait for consul container to be available before bootstrap
  ansible.builtin.command: docker exec consul true
  register: consul_wait_bootstrap
  until: consul_wait_bootstrap.rc == 0
  retries: 12
  delay: 5
  changed_when: false
  when: (consul_container_check.stdout | trim) == 'consul' or consul_container_created is changed
  tags:
    - consul
    - docker
    - consul_acl

- name: Check if consul ACL bootstrap result already exists
  ansible.builtin.stat:
    path: "{{ consul_directory }}/bootstrap_token.txt"
  register: consul_bootstrap_file
  tags:
    - consul
    - config
    - consul_acl

- name: Wait for Consul HTTP API before bootstrap
  ansible.builtin.command: docker exec consul sh -c 'wget -q -O- http://127.0.0.1:8500/v1/status/leader || exit 1'
  register: consul_api_wait
  until: consul_api_wait.rc == 0
  retries: 30
  delay: 2
  changed_when: false
  when: not consul_bootstrap_file.stat.exists or (consul_bootstrap_file.stat.size | default(0)) == 0
  tags:
    - consul
    - config
    - consul_acl

- name: Run consul acl bootstrap and token create, write all output to config directory
  ansible.builtin.shell: |
    docker exec consul sh -c 'consul acl bootstrap > /consul/config/bootstrap_token.txt 2>&1 && echo "---" >> /consul/config/bootstrap_token.txt && TOKEN=$(grep -E "^SecretID:" /consul/config/bootstrap_token.txt | awk '"'"'{print $2}'"'"') && CONSUL_HTTP_TOKEN="$TOKEN" consul acl token create -policy-name global-management >> /consul/config/bootstrap_token.txt 2>&1'
  args:
    executable: /bin/bash
  changed_when: true
  failed_when: false
  when: not consul_bootstrap_file.stat.exists or (consul_bootstrap_file.stat.size | default(0)) == 0
  register: consul_bootstrap_run
  tags:
    - consul
    - config
    - consul_acl

- name: Check if bootstrap token file was created
  ansible.builtin.stat:
    path: "{{ consul_directory }}/bootstrap_token.txt"
  register: consul_bootstrap_file_after
  when: consul_bootstrap_run is not skipped
  tags:
    - consul
    - config
    - consul_acl

- name: Set ownership on bootstrap token file
  ansible.builtin.file:
    path: "{{ consul_directory }}/bootstrap_token.txt"
    state: file
    owner: root
    group: root
    mode: '0600'
  when: consul_bootstrap_file_after.stat.exists | default(false)
  tags:
    - consul
    - config
    - consul_acl

# ---------------------------------------------------------------------------
# ACL policy tekne: copy rules file and create policy (only when bootstrap token exists)
# ---------------------------------------------------------------------------
# Stat the bootstrap file here so this block works when run with --tags acl or consul_acl.

- name: Check bootstrap token file for ACL section
  ansible.builtin.stat:
    path: "{{ consul_directory }}/bootstrap_token.txt"
  register: acl_bootstrap_file
  tags:
    - consul
    - config
    - acl

- name: Copy acl_tekne.hcl to consul config directory
  ansible.builtin.copy:
    src: acl_tekne.hcl
    dest: "{{ consul_directory }}/acl_tekne.hcl"
    owner: root
    group: root
    mode: '0644'
  tags:
    - consul
    - config
    - acl

- name: Create Consul ACL policy tekne from acl_tekne.hcl
  ansible.builtin.shell: |
    docker exec consul sh -c 'TOKEN=$(grep -i SecretID /consul/config/bootstrap_token.txt | head -1 | awk -F: '"'"'{print $2}'"'"' | tr -d " \r") && cd /consul/config && CONSUL_HTTP_TOKEN="$TOKEN" consul acl policy create -name tekne -rules @acl_tekne.hcl'
  args:
    executable: /bin/bash
  failed_when: false
  when: acl_bootstrap_file.stat.exists and (acl_bootstrap_file.stat.size | default(0)) > 0
  tags:
    - consul
    - config
    - acl

- name: Create Consul ACL role tekne-admin with policy tekne
  ansible.builtin.shell: |
    docker exec consul sh -c 'TOKEN=$(grep -i SecretID /consul/config/bootstrap_token.txt | head -1 | awk -F: '"'"'{print $2}'"'"' | tr -d " \r") && CONSUL_HTTP_TOKEN="$TOKEN" consul acl role create -name tekne-admin -policy-name tekne'
  args:
    executable: /bin/bash
  failed_when: false
  when: acl_bootstrap_file.stat.exists and (acl_bootstrap_file.stat.size | default(0)) > 0
  tags:
    - consul
    - config
    - acl

- name: Create tekne-admin token and append to bootstrap_token.txt (single shell on host)
  ansible.builtin.shell: |
    F="{{ consul_directory }}/bootstrap_token.txt"
    TOKEN=$(grep -i SecretID "$F" 2>/dev/null | head -1 | awk -F: '{print $2}' | tr -d ' \r') || true
    OUT=$(docker exec -e CONSUL_HTTP_TOKEN="$TOKEN" consul consul acl token create -role-name tekne-admin 2>&1) || true
    { echo ""; echo "---"; echo "$OUT"; } >> "$F"
  args:
    executable: /bin/bash
  register: append_tekne_result
  failed_when: false
  tags:
    - consul
    - config
    - acl

- name: Create Consul KV key tekne/
  ansible.builtin.shell: |
    TOKEN=$(grep -i SecretID "{{ consul_directory }}/bootstrap_token.txt" 2>/dev/null | head -1 | awk -F: '{print $2}' | tr -d ' \r') || true
    docker exec -e CONSUL_HTTP_TOKEN="$TOKEN" consul consul kv put tekne/aws/us-west-2/network ""
  args:
    executable: /bin/bash
  register: consul_kv_put_tekne
  failed_when: false
  when: acl_bootstrap_file.stat.exists | default(false) and (acl_bootstrap_file.stat.size | default(0)) > 0
  tags:
    - consul
    - config
    - acl
