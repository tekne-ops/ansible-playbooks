  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xsettings -p /Gtk/FontName \
      -n -t string -s '{{ bootstrap_xfce_font }}'"
  tags: [bootstrap, xfce, fonts]

# ============================================
# SUMMARY
# ============================================

- name: Display XFCE configuration summary
  ansible.builtin.debug:
    msg:
      - >-
        XFCE configuration {{ 'applied' if (xfce_display_available | default(true))
        else 'SKIPPED (no display)' }}:
      - "  User: {{ bootstrap_user }}"
      - "  Monitors: {{ bootstrap_xfce_monitors | join(', ') }}"
      - "  Cursor theme: {{ bootstrap_xfce_cursor_theme }}"
      - "  WM theme: {{ bootstrap_xfce_wm_theme }}"
      - "  GTK theme: {{ bootstrap_xfce_gtk_theme }}"
      - "  Icon theme: {{ bootstrap_xfce_icon_theme }}"
      - "  Font: {{ bootstrap_xfce_font }}"
      - "  Monospace font: {{ bootstrap_xfce_monospace_font }}"
      - "  Workspaces: {{ bootstrap_xfce_workspace_count }}"
  tags: [bootstrap, xfce]
