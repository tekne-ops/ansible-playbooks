---
# ============================================
# WALLPAPER CONFIGURATION
# ============================================

- name: Configure XFCE desktop wallpaper for each monitor
  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xfce4-desktop \
      -p /backdrop/screen0/monitor{{ item }}/workspace0/last-image \
      -n -t string -s \
      '{{ bootstrap_xfce_wallpaper | replace("'", "'\"'\"'") }}'"
  loop: "{{ bootstrap_xfce_monitors }}"
  loop_control:
    label: "{{ item }}"
  tags: [bootstrap, xfce, wallpaper]

# ============================================
# CURSOR AND THEME CONFIGURATION
# ============================================

- name: Configure cursor theme
  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xsettings -p /Gtk/CursorThemeName \
      -n -t string -s '{{ bootstrap_xfce_cursor_theme }}'"
  tags: [bootstrap, xfce, cursor]

- name: Configure window manager theme
  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xfwm4 -p /general/theme \
      -n -t string -s '{{ bootstrap_xfce_wm_theme }}'"
  tags: [bootstrap, xfce, theme]

- name: Configure icon theme
  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xsettings -p /Net/IconThemeName \
      -n -t string -s '{{ bootstrap_xfce_icon_theme }}'"
  tags: [bootstrap, xfce, theme]

- name: Configure GTK theme
  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xsettings -p /Net/ThemeName \
      -n -t string -s '{{ bootstrap_xfce_gtk_theme }}'"
  tags: [bootstrap, xfce, theme]

# ============================================
# KEYBOARD SHORTCUTS
# ============================================

- name: Configure keyboard shortcut - Terminal (Super+t)
  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xfce4-keyboard-shortcuts \
      -p \"/commands/custom/<Super>t\" \
      -n -t string -s 'exo-open --launch TerminalEmulator'"
  tags: [bootstrap, xfce, shortcuts]

- name: Configure keyboard shortcut - Web Browser (Super+b)
  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xfce4-keyboard-shortcuts \
      -p \"/commands/custom/<Super>b\" \
      -n -t string -s 'exo-open --launch WebBrowser'"
  tags: [bootstrap, xfce, shortcuts]

# ============================================
# WORKSPACE CONFIGURATION
# ============================================

- name: Configure workspace count
  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xfwm4 -p /general/workspace_count \
      -n -t int -s {{ bootstrap_xfce_workspace_count }}"
  tags: [bootstrap, xfce, workspaces]

# ============================================
# SOUND CONFIGURATION
# ============================================

- name: Enable input feedback sounds
  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xsettings -p /Net/EnableInputFeedbackSounds \
      -n -t bool -s true"
  tags: [bootstrap, xfce, sounds]

- name: Enable event sounds
  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xsettings -p /Net/EnableEventSounds \
      -n -t bool -s true"
  tags: [bootstrap, xfce, sounds]

# ============================================
# FONT CONFIGURATION
# ============================================

- name: Configure font rendering (RGBA)
  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xsettings -p /Xft/RGBA \
      -n -t string -s '{{ bootstrap_xfce_font_rgba }}'"
  tags: [bootstrap, xfce, fonts]

- name: Configure monospace font
  ansible.builtin.shell:
    cmd: |
      sudo -u dvaliente env -i bash -c "XDG_RUNTIME_DIR='/run/user/1000' \
      DISPLAY=:0 DBUS_SESSION_BUS_ADDRESS='unix:path=/run/user/1000/bus' \
      xfconf-query -c xsettings -p /Gtk/MonospaceFontName \
      -n -t string -s '{{ bootstrap_xfce_monospace_font }}'"
