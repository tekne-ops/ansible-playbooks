---
# ============================================
# FIRST SYNC
# ============================================

- name: Check if OneDrive has been synced before
  become: true
  become_user: "{{ bootstrap_user }}"
  ansible.builtin.stat:
    path: "{{ bootstrap_onedrive_config_dir }}/items.sqlite3"
  register: onedrive_db_check
  tags: [bootstrap, onedrive, sync]

- name: Display skip message if already synced
  ansible.builtin.debug:
    msg:
      - "OneDrive database already exists at {{ bootstrap_onedrive_config_dir }}/items.sqlite3"
      - "Skipping first sync - OneDrive has been synced before"
  when: onedrive_db_check.stat.exists
  tags: [bootstrap, onedrive, sync]

- name: Run OneDrive first sync (interactive - will show auth URL)
  become: true
  become_user: "{{ bootstrap_user }}"
  ansible.builtin.shell:
    cmd: "{{ bootstrap_onedrive_binary }} {{ bootstrap_onedrive_sync_options }} --confdir={{ bootstrap_onedrive_config_dir }} &"
  register: onedrive_first_sync
  when: not onedrive_db_check.stat.exists
  tags: [bootstrap, onedrive, sync]

- name: Set OneDrive output lines for display
  ansible.builtin.debug:
    msg: "{{ onedrive_first_sync.stdout_lines }}"
  when: not onedrive_db_check.stat.exists
  tags: [bootstrap, onedrive, sync]

- name: Wait for user to authenticate with OneDrive
  ansible.builtin.pause:
    prompt: |

      ==========================================
      ONEDRIVE AUTHENTICATION REQUIRED
      ==========================================

      Look for the Microsoft URL and code in the output above.
      If you don't see it, check the terminal where Ansible is running.

      Steps:
        1. Go to the URL
        2. Type in the code
        3. Sign in with your Microsoft account
        4. Authorize the OneDrive application

      Press Enter AFTER done, or Ctrl+C to abort.
  when: not onedrive_db_check.stat.exists
  tags: [bootstrap, onedrive, sync]

- name: Wait for OneDrive sync to complete
  become: true
  become_user: "{{ bootstrap_user }}"
  ansible.builtin.shell:
    cmd: "pgrep -f '/usr/bin/onedrive --sync --download-only --verbose --confdir=/home/dvaliente/.config/onedrive'"
  register: onedrive_process_result
  when: not onedrive_db_check.stat.exists
  tags: [bootstrap, onedrive, sync]

- name: Wait for OneDrive sync to complete
  ansible.builtin.wait_for:
    path: "/proc/{{ onedrive_process_result.stdout }}/status"
    state: absent

- name: Display sync completion message
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "OneDrive first sync completed!"
      - "Return code: {{ onedrive_job_result.rc | default('N/A') }}"
      - "=========================================="
  when:
    - not onedrive_db_check.stat.exists
  tags: [bootstrap, onedrive, sync]

# ============================================
# SERVICE ENABLEMENT
# ============================================

- name: Get user UID for systemd user scope
  become: true
  ansible.builtin.shell: 'getent passwd "{{ bootstrap_user }}" | cut -d: -f3'
  register: bootstrap_user_uid
  changed_when: false
  tags: [bootstrap, onedrive, service]

- name: Check if XDG_RUNTIME_DIR exists for user
  become: true
  ansible.builtin.stat:
    path: "/run/user/{{ bootstrap_user_uid.stdout }}"
  register: xdg_runtime_check
  tags: [bootstrap, onedrive, service]

- name: Create XDG_RUNTIME_DIR if it doesn't exist
  become: true
  ansible.builtin.file:
    path: "/run/user/{{ bootstrap_user_uid.stdout }}"
    state: directory
    owner: "{{ bootstrap_user }}"
    group: "{{ bootstrap_group }}"
    mode: '0700'
  when: not xdg_runtime_check.stat.exists
  tags: [bootstrap, onedrive, service]

- name: Reload systemd user daemon
  become: true
  become_user: "{{ bootstrap_user }}"
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ bootstrap_user_uid.stdout }}"
  tags: [bootstrap, onedrive, service]

- name: Enable OneDrive user service
  become: true
  become_user: "{{ bootstrap_user }}"
  ansible.builtin.systemd:
    name: onedrive.service
    enabled: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ bootstrap_user_uid.stdout }}"
  tags: [bootstrap, onedrive, service]

- name: Display service enabled message
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "OneDrive service enabled: onedrive.service"
      - "The service will start automatically on login"
      - "To start now: systemctl --user start onedrive.service"
      - "To check status: systemctl --user status onedrive.service"
      - "=========================================="
  tags: [bootstrap, onedrive, service]
