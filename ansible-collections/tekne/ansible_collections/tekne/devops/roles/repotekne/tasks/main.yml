---
# tasks file for ansible-role-repotekne

- name: Create repotekne directory
  ansible.builtin.file:
    path: /srv/docker/repotekne
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags:
    - repotekne
    - config

- name: Check if repotekne container already exists
  ansible.builtin.command: docker ps -a -f name=^repotekne$ --format '{{ "{{" }}.Names{{ "}}" }}'
  register: repotekne_container_check
  changed_when: false
  failed_when: false
  tags:
    - repotekne
    - docker

- name: Create and start repotekne Docker container
  ansible.builtin.shell: |
    docker run -d --name repotekne --restart=unless-stopped \
      --net dockers --ip 192.168.75.13 \
      -v /srv/docker/repotekne:/var/local/repo/tekne \
      -v /mnt/cache/aur-build-tekne:/tmp/aur-build-tekne \
      fiercebrake/arch:1.1.0
  when: (repotekne_container_check.stdout | trim) != 'repotekne'
  tags:
    - repotekne
    - docker

- name: Wait for repotekne container to be available
  ansible.builtin.command: docker exec repotekne true
  register: repotekne_wait
  until: repotekne_wait.rc == 0
  retries: 12
  delay: 5
  changed_when: false
  tags:
    - repotekne
    - docker
    - setup

- name: Symlink vi to vim in repotekne container
  ansible.builtin.shell: docker exec repotekne ln -sf /usr/bin/vim /usr/bin/vi
  changed_when: true
  tags:
    - repotekne
    - setup

- name: Create sudoers fragment for repo user in repotekne container
  ansible.builtin.shell: "docker exec repotekne bash -c 'cat > /etc/sudoers.d/repo << EOF\nrepo  ALL=(ALL:ALL) ALL\nrepo  ALL=(ALL) NOPASSWD: ALL\nEOF'"
  tags:
    - repotekne
    - setup

- name: Ensure repo user exists in repotekne container
  ansible.builtin.shell: |
    docker exec repotekne bash -c 'id -u repo &>/dev/null || (useradd --system -s /usr/bin/nologin repo && usermod -aG wheel repo)'
  tags:
    - repotekne
    - setup

- name: Create directories and set ownership in repotekne container
  ansible.builtin.shell: |
    docker exec repotekne bash -c 'mkdir -p /home/repo && chown repo:repo /home/repo && mkdir -p /srv/code/tekne && mkdir -p /var/local/repo-tekne'
  tags:
    - repotekne
    - setup

- name: Point nginx root to repo directory in repotekne container
  ansible.builtin.shell: |
    docker exec repotekne sed -i 's|/usr/share/nginx/html|/var/local/repo/tekne|g' /etc/nginx/nginx.conf
  tags:
    - repotekne
    - setup

- name: Set ownership of repo paths in repotekne container
  ansible.builtin.shell: |
    docker exec repotekne bash -c 'chown -R repo:repo /mnt/tkg/ 2>/dev/null; chown -R repo:repo /srv/code; chown -R repo:repo /var/local/repo/tekne'
  tags:
    - repotekne
    - setup

- name: Clone bash repo into repotekne container
  ansible.builtin.shell: |
    docker exec repotekne bash -c 'test -d /srv/code/tekne/bash || sudo -u repo git clone https://github.com/tekne-ops/bash /srv/code/tekne/bash'
  tags:
    - repotekne
    - setup

- name: Restart repotekne container
  ansible.builtin.shell: docker restart repotekne
  tags:
    - repotekne
    - docker
    - setup
