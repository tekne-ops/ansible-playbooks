---
# Kubernetes apt repository (pkgs.k8s.io)
k8s_version: "v1.36"
k8s_apt_release_key_url: "https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/Release.key"
k8s_apt_keyring_path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
k8s_apt_sources_list: /etc/apt/sources.list.d/kubernetes.list
k8s_apt_repository_line: "deb [signed-by={{ k8s_apt_keyring_path }}] https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/ /"

k8s_apt_prerequisites:
  - apt-transport-https
  - ca-certificates
  - curl
  - gpg
  - open-iscsi
  - nfs-common
  - util-linux

k8s_packages:
  - kubelet
  - kubeadm
  - kubectl

k8s_hold_packages:
  - kubelet
  - kubeadm
  - kubectl

# containerd.io is published on download.docker.com (not pkgs.k8s.io)
k8s_install_docker_repo: true
k8s_docker_apt_key_url: https://download.docker.com/linux/debian/gpg
k8s_docker_apt_keyring_path: /etc/apt/keyrings/docker.asc
k8s_docker_apt_sources_list: /etc/apt/sources.list.d/docker.list
# Override if Docker has no suite for your Debian release (e.g. trixie -> bookworm)
k8s_docker_apt_suite: "{{ ansible_distribution_release }}"

k8s_kubelet_service: kubelet
k8s_containerd_service: containerd

# Binary containerd / runc / CNI (upstream GitHub releases)
k8s_install_containerd_binary: true
k8s_containerd_version: "2.3.1"
k8s_containerd_arch_map:
  x86_64: amd64
  aarch64: arm64
k8s_containerd_arch: "{{ k8s_containerd_arch_map[ansible_architecture] | default(ansible_architecture) }}"
k8s_containerd_install_prefix: /usr/local
k8s_containerd_tarball_url: >-
  https://github.com/containerd/containerd/releases/download/v{{ k8s_containerd_version }}/containerd-{{ k8s_containerd_version }}-linux-{{ k8s_containerd_arch }}.tar.gz
k8s_containerd_tarball_dest: /tmp/containerd-{{ k8s_containerd_version }}-linux-{{ k8s_containerd_arch }}.tar.gz
k8s_containerd_service_url: https://raw.githubusercontent.com/containerd/containerd/main/containerd.service
k8s_containerd_unit_path: /usr/local/lib/systemd/system/containerd.service

k8s_runc_version: "1.4.2"
k8s_runc_url: https://github.com/opencontainers/runc/releases/download/v{{ k8s_runc_version }}/runc.{{ k8s_containerd_arch }}
k8s_runc_download_dest: /tmp/runc.amd64
k8s_runc_install_path: /usr/local/sbin/runc

k8s_cni_plugins_version: "1.9.1"
k8s_cni_plugins_arch: "{{ k8s_containerd_arch }}"
k8s_cni_plugins_url: >-
  https://github.com/containernetworking/plugins/releases/download/v{{ k8s_cni_plugins_version }}/cni-plugins-linux-{{ k8s_cni_plugins_arch }}-v{{ k8s_cni_plugins_version }}.tgz
k8s_cni_plugins_dest: /tmp/cni-plugins-linux-{{ k8s_cni_plugins_arch }}-v{{ k8s_cni_plugins_version }}.tgz
k8s_cni_bin_dir: /opt/cni/bin

k8s_containerd_bin: "{{ k8s_containerd_install_prefix }}/bin/containerd"
k8s_containerd_config_dir: /etc/containerd
k8s_containerd_config_path: /etc/containerd/config.toml
k8s_containerd_sandbox_image: "registry.k8s.io/pause:3.10"
# Insert sandbox_image immediately after this key in config.toml (default containerd spelling)
k8s_containerd_sandbox_insert_after: enable_tls_streaming

# kubeadm init (control plane only)
k8s_install_kubeadm_init: true
k8s_kube_config_user: "{{ ansible_user | default('devops') }}"
k8s_kubeadm_join_facts_path: /root/kubeadm-join.facts.yml
k8s_kubeconfig_admin_path: /etc/kubernetes/admin.conf
k8s_control_plane_port: 6443

# kubeadm join (workers only)
k8s_install_kubeadm_join: true

# Cluster verification (control plane only)
k8s_run_cluster_verify: true
k8s_cluster_verify_commands:
  - kubectl get nodes -o wide
  - kubectl get pods -A -o wide
  - kubectl get pods -n calico-system -o wide
  - kubectl get pods -n kube-system -l k8s-app=kube-dns
  - kubectl get svc
  - kubectl cluster-info

# Calico (control plane only, after kubeadm init + kubeconfig)
k8s_install_calico: true
k8s_master_host: k8s-mstr00
k8s_calico_version: "v3.32.0"
k8s_calico_manifest_base: "https://raw.githubusercontent.com/projectcalico/calico/{{ k8s_calico_version }}/manifests"
k8s_calico_tigera_operator_url: "{{ k8s_calico_manifest_base }}/tigera-operator.yaml"
k8s_calico_custom_resources_url: "{{ k8s_calico_manifest_base }}/custom-resources.yaml"
k8s_calico_wait_retries: 30
k8s_calico_wait_delay: 10
k8s_calico_pod_wait_timeout: 300
