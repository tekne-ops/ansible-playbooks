---
# Cluster health checks (control plane only). Prints a formatted kubectl report.

- name: Verify admin kubeconfig exists for cluster health checks
  ansible.builtin.stat:
    path: "{{ k8s_kubeconfig_admin_path }}"
  register: k8s_cluster_verify_kubeconfig
  failed_when: not k8s_cluster_verify_kubeconfig.stat.exists
  when: inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
  tags:
    - k8s
    - k8s-verify

- name: Run cluster health check commands
  ansible.builtin.command:
    cmd: "{{ item }}"
  environment:
    KUBECONFIG: "{{ k8s_kubeconfig_admin_path }}"
  register: k8s_cluster_health_checks
  changed_when: false
  failed_when: false
  loop: "{{ k8s_cluster_verify_commands }}"
  when: inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
  tags:
    - k8s
    - k8s-verify

- name: Build formatted cluster health report
  ansible.builtin.set_fact:
    k8s_cluster_health_report: "{{ lookup('template', 'cluster_health_report.j2') }}"
  when:
    - inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
    - k8s_cluster_health_checks is defined
    - not (k8s_cluster_health_checks.skipped | default(false))
  tags:
    - k8s
    - k8s-verify

- name: Print cluster health report
  ansible.builtin.debug:
    msg: "{{ k8s_cluster_health_report }}"
  when:
    - inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
    - k8s_cluster_health_report is defined
  tags:
    - k8s
    - k8s-verify

- name: Fail if any cluster health check command failed
  ansible.builtin.assert:
    that: item.rc == 0
    fail_msg: "Cluster check failed: {{ item.item }}"
  loop: "{{ k8s_cluster_health_checks.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
    - k8s_cluster_health_checks is defined
    - not (k8s_cluster_health_checks.skipped | default(false))
  tags:
    - k8s
    - k8s-verify
