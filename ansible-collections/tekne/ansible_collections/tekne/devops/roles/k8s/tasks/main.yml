---
# Prepare Debian hosts with Kubernetes packages (kubelet, kubeadm, kubectl)
# and container runtime (containerd.io, runc). Services enabled, not started.

- name: Enable IPv4 forwarding in sysctl.conf
  ansible.builtin.lineinfile:
    path: /etc/sysctl.conf
    line: "net.ipv4.ip_forward=1"
    regexp: '^net\.ipv4\.ip_forward\s*='
    create: true
  tags:
    - k8s
    - k8s-sysctl

- name: Apply sysctl configuration
  ansible.builtin.command:
    cmd: sysctl -p
  changed_when: false
  tags:
    - k8s
    - k8s-sysctl

- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0
  tags:
    - k8s
    - k8s-apt

- name: Install apt prerequisites for Kubernetes repository
  ansible.builtin.apt:
    name: "{{ k8s_apt_prerequisites }}"
    state: present
  tags:
    - k8s
    - k8s-apt

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags:
    - k8s
    - k8s-apt

- name: Download Kubernetes apt repository signing key
  ansible.builtin.get_url:
    url: "{{ k8s_apt_release_key_url }}"
    dest: /tmp/kubernetes-apt-release.key
    mode: "0644"
  tags:
    - k8s
    - k8s-apt

- name: Install dearmored Kubernetes apt signing key
  ansible.builtin.command:
    cmd: gpg --dearmor -o {{ k8s_apt_keyring_path }} /tmp/kubernetes-apt-release.key
    creates: "{{ k8s_apt_keyring_path }}"
  tags:
    - k8s
    - k8s-apt

- name: Add Kubernetes apt repository
  ansible.builtin.copy:
    dest: "{{ k8s_apt_sources_list }}"
    content: "{{ k8s_apt_repository_line }}\n"
    mode: "0644"
    owner: root
    group: root
  tags:
    - k8s
    - k8s-apt

- name: Configure Docker apt repository for containerd.io
  when: k8s_install_docker_repo | bool and ('containerd.io' in k8s_packages)
  tags:
    - k8s
    - k8s-apt
    - k8s-containerd
  block:
    - name: Download Docker apt signing key
      ansible.builtin.get_url:
        url: "{{ k8s_docker_apt_key_url }}"
        dest: "{{ k8s_docker_apt_keyring_path }}"
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.copy:
        dest: "{{ k8s_docker_apt_sources_list }}"
        content: |
          deb [arch={{ ansible_facts['architecture'] | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by={{ k8s_docker_apt_keyring_path }}] https://download.docker.com/linux/debian {{ k8s_docker_apt_suite }} stable
        mode: "0644"
        owner: root
        group: root

- name: Update apt cache after adding repositories
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0
  tags:
    - k8s
    - k8s-apt

- name: Install Kubernetes and container runtime packages
  ansible.builtin.apt:
    name: "{{ k8s_packages }}"
    state: present
  tags:
    - k8s
    - k8s-packages

- name: Hold kubelet, kubeadm, and kubectl packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ k8s_hold_packages }}"
  tags:
    - k8s
    - k8s-packages

- name: Enable kubelet service (do not start)
  ansible.builtin.systemd:
    name: "{{ k8s_kubelet_service }}"
    enabled: true
    state: stopped
  tags:
    - k8s
    - k8s-services

- name: Install containerd, runc, and CNI from upstream binaries
  ansible.builtin.import_tasks: containerd_runtime.yml
  when: k8s_install_containerd_binary | bool
  tags:
    - k8s
    - k8s-containerd

- name: Initialize Kubernetes control plane
  ansible.builtin.import_tasks: kubeadm_init.yml
  when:
    - k8s_install_kubeadm_init | bool
    - inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
  tags:
    - k8s
    - k8s-kubeadm

- name: Install Calico CNI on control plane
  ansible.builtin.import_tasks: calico.yml
  when:
    - k8s_install_calico | bool
    - inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-calico
    - k8s-calico-custom

- name: Join worker nodes to Kubernetes cluster
  ansible.builtin.import_tasks: kubeadm_join.yml
  when:
    - k8s_install_kubeadm_join | bool
    - inventory_hostname in groups.get('k8s_workers', [])
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-kubeadm-join

- name: Verify Kubernetes cluster health
  ansible.builtin.import_tasks: cluster_verify.yml
  when:
    - k8s_run_cluster_verify | bool
    - inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
  tags:
    - k8s
    - k8s-verify
