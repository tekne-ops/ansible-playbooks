---
# Join worker nodes to the cluster using kubeadm join credentials from the control plane.

- name: Resolve kubeadm join token from control plane hostvars
  ansible.builtin.set_fact:
    k8s_join_token: "{{ hostvars[k8s_master_host]['k8s_kubeadm_join_token'] | default('') }}"
    k8s_join_discovery_hash: "{{ hostvars[k8s_master_host]['k8s_kubeadm_discovery_token_ca_cert_hash'] | default('') }}"
    k8s_join_control_plane_host: "{{ hostvars[k8s_master_host]['ansible_host'] | default(hostvars[k8s_master_host]['ansible_default_ipv4']['address'] | default('')) }}"
  when: inventory_hostname in groups.get('k8s_workers', [])
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-kubeadm-join

- name: Load kubeadm join credentials from control plane facts file
  ansible.builtin.slurp:
    src: "{{ k8s_kubeadm_join_facts_path }}"
  delegate_to: "{{ k8s_master_host }}"
  register: k8s_join_facts_slurp
  run_once: true
  when:
    - inventory_hostname in groups.get('k8s_workers', [])
    - hostvars[k8s_master_host]['k8s_kubeadm_join_token'] | default('') | length == 0
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-kubeadm-join

- name: Parse kubeadm join credentials from control plane facts file
  ansible.builtin.set_fact:
    k8s_join_token: "{{ (k8s_join_facts_slurp.content | b64decode).split('k8s_kubeadm_join_token:')[1].split('\n')[0] | trim }}"
    k8s_join_discovery_hash: "{{ (k8s_join_facts_slurp.content | b64decode).split('k8s_kubeadm_discovery_token_ca_cert_hash:')[1].split('\n')[0] | trim }}"
  when:
    - inventory_hostname in groups.get('k8s_workers', [])
    - k8s_join_facts_slurp is defined
    - not (k8s_join_facts_slurp.skipped | default(false))
    - k8s_join_token | default('') | length == 0
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-kubeadm-join

- name: Set control plane host for kubeadm join when not loaded from hostvars
  ansible.builtin.set_fact:
    k8s_join_control_plane_host: "{{ hostvars[k8s_master_host]['ansible_host'] }}"
  when:
    - inventory_hostname in groups.get('k8s_workers', [])
    - k8s_join_control_plane_host | default('') | length == 0
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-kubeadm-join

- name: Verify kubeadm join credentials are available
  ansible.builtin.assert:
    that:
      - k8s_join_token | default('') | length > 0
      - k8s_join_discovery_hash | default('') | length > 0
      - k8s_join_control_plane_host | default('') | length > 0
    fail_msg: >-
      Missing kubeadm join credentials. Run kubeadm init on {{ k8s_master_host }} first
      (tags: k8s-kubeadm) or ensure {{ k8s_kubeadm_join_facts_path }} exists on the control plane.
  when: inventory_hostname in groups.get('k8s_workers', [])
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-kubeadm-join

- name: Check if node is already joined to the cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: k8s_kubelet_conf
  when: inventory_hostname in groups.get('k8s_workers', [])
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-kubeadm-join

- name: Join worker node to Kubernetes cluster
  ansible.builtin.command:
    cmd: >-
      kubeadm join --token {{ k8s_join_token }}
      {{ k8s_join_control_plane_host }}:{{ k8s_control_plane_port }}
      --discovery-token-ca-cert-hash {{ k8s_join_discovery_hash }}
  register: k8s_kubeadm_join_result
  changed_when: k8s_kubeadm_join_result.rc == 0
  when:
    - inventory_hostname in groups.get('k8s_workers', [])
    - not k8s_kubelet_conf.stat.exists
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-kubeadm-join
