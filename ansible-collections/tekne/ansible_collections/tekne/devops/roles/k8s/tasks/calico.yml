---
# Calico via Tigera operator (control plane only, after kubeadm init + kubeconfig).

- name: Verify Kubernetes admin kubeconfig exists before Calico install
  ansible.builtin.stat:
    path: "{{ k8s_kubeconfig_admin_path }}"
  register: k8s_calico_admin_conf
  failed_when: not k8s_calico_admin_conf.stat.exists
  when: inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-calico

- name: Apply Tigera operator manifest
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_calico_tigera_operator_url }}
  environment:
    KUBECONFIG: "{{ k8s_kubeconfig_admin_path }}"
  register: k8s_calico_tigera_operator_apply
  changed_when: >-
    'created' in k8s_calico_tigera_operator_apply.stdout
    or 'configured' in k8s_calico_tigera_operator_apply.stdout
  when: inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-calico

- name: Wait for Tigera operator CRDs to be registered
  ansible.builtin.command:
    cmd: kubectl get crds
  environment:
    KUBECONFIG: "{{ k8s_kubeconfig_admin_path }}"
  register: k8s_calico_tigera_crds
  until: >-
    k8s_calico_tigera_crds.rc == 0
    and k8s_calico_tigera_crds.stdout is search('installations.operator.tigera.io')
    and k8s_calico_tigera_crds.stdout is search('apiservers.operator.tigera.io')
  retries: "{{ k8s_calico_wait_retries }}"
  delay: "{{ k8s_calico_wait_delay }}"
  changed_when: false
  when: inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-calico

- name: Apply Calico custom resources manifest
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_calico_custom_resources_url }}
  environment:
    KUBECONFIG: "{{ k8s_kubeconfig_admin_path }}"
  register: k8s_calico_custom_resources_apply
  changed_when: >-
    'created' in k8s_calico_custom_resources_apply.stdout
    or 'configured' in k8s_calico_custom_resources_apply.stdout
  when: inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-calico
    - k8s-calico-custom

- name: Wait for tigera-operator pod to be Running
  ansible.builtin.command:
    cmd: >-
      kubectl wait --namespace=tigera-operator
      --for=condition=Ready pod
      --selector=name=tigera-operator
      --timeout={{ k8s_calico_pod_wait_timeout }}s
  environment:
    KUBECONFIG: "{{ k8s_kubeconfig_admin_path }}"
  register: k8s_calico_tigera_operator_pods
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups.get('k8s_control_plane', [k8s_master_host])
  tags:
    - k8s
    - k8s-kubeadm
    - k8s-calico
