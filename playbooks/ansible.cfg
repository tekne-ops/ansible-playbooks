[defaults]
roles_path = ./roles:../../roles
# Collection root = parent dir (ansible-playbooks). Requires ansible_collections/tekne/devops there (symlink to ../../../ansible-collections/tekne/devops).
# Run from playbooks/ with: ansible-playbook main.yml   (so .. = ansible-playbooks)
collections_paths = /srv/code/tekne/ansible:/root/.ansible/collections:/home/dvaliente/.ansible/collections

# Inventory
inventory = inventories
retry_files_enabled = False
bin_ansible_callbacks = True


# Fact caching for hostname persistence across plays
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 86400

# Output
stdout_callback = default
result_format = yaml
callbacks_enabled = profile_tasks

# SSH settings (for non-local connections)
host_key_checking = False
timeout = 30

# Privilege escalation
become = True
become_method = sudo

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False
